<!DOCTYPE html>
<html class="theme-dark" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SKRT7 | Bio</title>
  
  <style>
    :root {
      --bg-color: #07080B;
      --text-color: #E4E6EB;
      --card-bg: #1F222F;
      --sub-text: #94A3B8;
    }
    .light-theme {
      --bg-color: #F8FAFC;
      --text-color: #0F172A;
      --card-bg: #E2E8F0;
      --sub-text: #64748B;
    }
    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      transition: background-color 0.4s ease, color 0.3s ease;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      margin: 0; padding: 0;
    }

    .container { margin-top: 10vh; padding-bottom: 50px; }
    
    /* الأفاتار والديكور */
    .avatar-wrapper { position: relative; width: 110px; height: 110px; margin: 0 auto 25px auto; }
    .avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background-color: var(--card-bg); z-index: 1; opacity: 0; transition: opacity 0.5s; }
    .avatar-decoration { position: absolute; top: -10%; left: -10%; width: 120%; height: 120%; pointer-events: none; z-index: 2; opacity: 0; transition: opacity 0.5s; display: none; }
    .avatar-status-badge { position: absolute; bottom: 0px; right: 0px; width: 32px; height: 32px; background-color: var(--bg-color); border-radius: 50%; z-index: 3; display: flex; align-items: center; justify-content: center; }
    .avatar-status-badge svg { width: 100%; height: 100%; }

    /* الحالة والأزرار */
    .discord-status-card { display: inline-flex; align-items: center; justify-content: center; gap: 8px; background: var(--card-bg); color: var(--text-color); padding: 8px 18px; border-radius: 20px; margin: 0 auto 20px auto; font-size: 0.9rem; }
    .status-custom-emoji { width: 20px; height: 20px; border-radius: 4px; object-fit: contain; }
    .celebration-name { font-size: 3rem; font-weight: 900; background: linear-gradient(45deg, #ff007f, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
    
    .theme-switch-wrapper { margin: 15px auto; }
    .theme-switch { position: relative; display: inline-block; width: 50px; height: 26px; }
    .theme-switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--card-bg); border-radius: 34px; border: 1px solid var(--sub-text); transition: .4s; }
    .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 3px; background-color: var(--text-color); border-radius: 50%; transition: .4s; }
    input:checked + .slider { background-color: #5865F2; }
    input:checked + .slider:before { transform: translateX(24px); background-color: #fff; }

    .button-stack { width: 90%; max-width: 400px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
    .ship-btn { text-decoration: none; display: flex; align-items: center; justify-content: center; height: 50px; border-radius: 12px; font-weight: bold; color: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: transform 0.2s; }
    .ship-btn:hover { transform: scale(1.02); }
    .discord { background: #5865F2; } .instagram { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); } .github { background: #171515; } .youtube { background: #FF0000; } .spotify { background: #1DB954; } .facebook { background: #1877F2; }

    /* زر GitHub السفلي */
    .github-star-wrapper { position: fixed; bottom: 20px; left: 20px; z-index: 100; }
    .star-btn { display: flex; align-items: center; background: #1f222f; padding: 8px 15px; border-radius: 8px; border: 1px solid #333; color: #fff; font-size: 0.8rem; text-decoration: none; }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head> 

<body>

  <div class="container">
    <div class="avatar-wrapper">
      <img class="avatar" id="discordAvatar" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="Avatar">
      <img class="avatar-decoration" id="avatarDecoration" src="" alt="Decoration">
      <div class="avatar-status-badge" id="avatarStatusBadge"></div>
    </div>
    
    <h1 class="celebration-name">SKRT7.</h1>
    <p style="color: var(--sub-text);">Developer & Discord Server Manager. Welcome to my space.</p>

    <div class="discord-status-card" id="statusCardWrapper">Loading...</div>

    <div class="theme-switch-wrapper">
      <label class="theme-switch">
        <input type="checkbox" id="themeCheckbox">
        <span class="slider"></span>
      </label>
    </div>

    <div class="button-stack">
      <a href="https://discord.gg/Vk8WJhpQW4" target="_blank" class="ship-btn discord"><i class="fa-brands fa-discord"></i> Discord</a>
      <a href="https://www.instagram.com/skrt7_66" target="_blank" class="ship-btn instagram"><i class="fa-brands fa-instagram"></i> Instagram</a>
      <a href="https://github.com/SKRT7-0day" target="_blank" class="ship-btn github"><i class="fa-brands fa-github"></i> GitHub</a>
      <a href="https://www.youtube.com/@SKRT7-v5h" target="_blank" class="ship-btn youtube"><i class="fa-brands fa-youtube"></i> YouTube</a>
      <a href="#" class="ship-btn spotify"><i class="fa-brands fa-spotify"></i> Spotify</a>
      <a href="https://www.facebook.com/share/18giPaZseb/" target="_blank" class="ship-btn facebook"><i class="fa-brands fa-facebook"></i> Facebook</a>
    </div>
  </div>

  <!-- زر GitHub السفلي -->
  <div class="github-star-wrapper">
    <a href="https://github.com/SKRT7-0day" target="_blank" class="star-btn">
      <i class="fa-brands fa-github" style="margin-right: 8px;"></i> Star on GitHub ★ 11
    </a>
  </div>

  <script>
    // الوضع الليلي
    const themeCheckbox = document.getElementById('themeCheckbox');
    if (localStorage.getItem('theme') === 'light') { document.body.classList.add('light-theme'); themeCheckbox.checked = false; } 
    else { themeCheckbox.checked = true; }
    themeCheckbox.addEventListener('change', () => {
      document.body.classList.toggle('light-theme');
      localStorage.setItem('theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
    });

    // جلب بيانات ديسكورد
    async function getDiscordStatus() {
      try {
        const res = await fetch(`https://api.lanyard.rest/v1/users/1217944125555474565`);
        const json = await res.json();
        if (json.success) {
          const { discord_user, discord_status, activities } = json.data;
          document.getElementById('discordAvatar').src = `https://cdn.discordapp.com/avatars/${discord_user.id}/${discord_user.avatar}.${discord_user.avatar.startsWith('a_') ? 'gif' : 'png'}?size=512`;
          document.getElementById('discordAvatar').style.opacity = '1';
          
          if (discord_user.avatar_decoration_data) {
            const dec = document.getElementById('avatarDecoration');
            dec.src = `https://cdn.discordapp.com/avatar-decoration-presets/${discord_user.avatar_decoration_data.asset}.png?size=256`;
            dec.style.display = 'block'; dec.style.opacity = '1';
          }

          const statusCard = document.getElementById('statusCardWrapper');
          const customStatus = activities.find(a => a.type === 4);
          if (customStatus) {
            let html = '';
            if (customStatus.emoji?.id) html += `<img src="https://cdn.discordapp.com/emojis/${customStatus.emoji.id}.${customStatus.emoji.animated ? 'gif' : 'png'}?size=44" class="status-custom-emoji" onerror="this.style.display='none'">`;
            html += `<span>${customStatus.state || ''}</span>`;
            statusCard.innerHTML = html;
          }
        }
      } catch (e) { console.error(e); }
    }
    getDiscordStatus();
    setInterval(getDiscordStatus, 30000);
  </script>
</body>
</html>
