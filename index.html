<!DOCTYPE html>
<html class="theme-dark" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SKRT7 | Bio</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* التنسيقات الأساسية */
    :root { --bg-color: #07080B; --text-color: #E4E6EB; --card-bg: #1F222F; --sub-text: #94A3B8; }
    .light-theme { --bg-color: #F8FAFC; --text-color: #0F172A; --card-bg: #E2E8F0; --sub-text: #64748B; }
    body { background-color: var(--bg-color); color: var(--text-color); transition: background-color 0.4s, color 0.3s; font-family: sans-serif; text-align: center; margin: 0; padding: 0; overflow-x: hidden; }
    .container { margin-top: 10vh; }
    .avatar { border: 3px solid var(--card-bg); box-shadow: 0 8px 32px rgba(0,0,0,0.4); transition: transform 0.3s ease; width: 128px; height: 128px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; }
    
    /* تأثيرات الاسم والأزرار */
    .celebration-container { position: relative; display: inline-block; margin: 10px auto; padding: 10px 30px; cursor: crosshair; }
    .celebration-name { font-size: 3rem; font-weight: 900; background: linear-gradient(45deg, #ff007f, #a855f7, #3b82f6, #ffd700); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    /* زر GitHub */
    .github-star-badge { position: fixed; bottom: 30px; left: 30px; z-index: 1000; display: inline-flex; align-items: center; padding: 0 16px; height: 40px; border-radius: 8px; background: #121213; color: white; text-decoration: none; border: 2px solid #333; }
    
    /* الأزرار الأخرى */
    .button-stack { width: 90%; max-width: 400px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }
    .ship-btn { text-decoration: none; display: flex; align-items: center; justify-content: center; height: 55px; border-radius: 15px; color: #fff; font-weight: bold; }
    
    /* اللودر */
    .loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--bg-color); z-index: 9999; display: flex; justify-content: center; align-items: center; transition: opacity 0.8s ease; }
    .fade-out { opacity: 0; visibility: hidden; }
  </style>
</head> 

<body>

  <div class="loading-screen" id="loadingScreen">
    <div style="font-size: 2rem;">Loading...</div>
  </div>

  <a href="https://github.com/SKRT7-0day/littlelink" target="_blank" class="github-star-badge">
    <i class="fa-brands fa-github" style="margin-right: 8px;"></i> Star on GitHub <span>| 11</span>
  </a>

  <div class="container">
    <img class="avatar" src="images/avatar.png" alt="SKRT7">
    <div class="celebration-container" id="interactiveName">
      <h1 class="celebration-name">SKRT7.</h1>
    </div>
    <p>Developer & Discord Server Manager.</p>

    <div class="button-stack">
      <a href="https://discord.gg/Vk8WJhpQW4" class="ship-btn" style="background:#5865F2">Discord</a>
      <a href="https://www.instagram.com/skrt7_66" class="ship-btn" style="background:#E1306C">Instagram</a>
      <a href="https://github.com/SKRT7-0day" class="ship-btn" style="background:#171515">GitHub</a>
    </div>

    <footer style="margin-top: 50px; color: var(--sub-text);">
      © 2026 SKRT7. <br>
      <a href="https://statcounter.com/p13262504/?guest=1" style="color:inherit">View Stats</a>
    </footer>
  </div>

  <script type="text/javascript">
    var sc_project=13262504; 
    var sc_invisible=0; 
    var sc_security="42e94328"; 
    var scJsHost = "https://";
    document.write("<sc"+"ript type='text/javascript' src='" + scJsHost+ "statcounter.com/counter/counter.js'></"+"script>");
  </script>
  <noscript>
    <div class="statcounter"><a href="https://statcounter.com/" target="_blank"><img src="https://c.statcounter.com/13262504/0/42e94328/0/" alt="Web Analytics"></a></div>
  </noscript>

  <script>
    // إخفاء اللودر
    window.addEventListener('load', () => {
      setTimeout(() => document.getElementById('loadingScreen').classList.add('fade-out'), 1000);
    });
  </script>
</body>
</html>
