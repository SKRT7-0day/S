<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKRT7 Space</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* === إعدادات الصفحة الأساسية === */
        body {
            background-color: #0f0f13; /* لون الخلفية الداكن */
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        /* ضع أكواد تصميم صورتك الشخصية (البروفايل) وزر الثيم (الليل/النهار) الخاصة بك هنا */


        /* === أكواد الأزرار وحركة الشاحنة === */
        .button-stack {
            display: flex;
            flex-direction: column;
            gap: 15px; /* المسافة بين الأزرار */
            width: 100%;
            max-width: 320px;
            margin-top: 30px;
        }

        .ship-btn {
            position: relative;
            width: 100%;
            height: 55px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            overflow: hidden;
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            transition: transform 0.2s ease, opacity 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .ship-btn:active {
            transform: scale(0.96); /* تأثير الضغط على الزر */
        }

        /* ألوان الأزرار وتدرجاتها */
        .discord { background-color: #5865F2; }
        .instagram { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .github { background-color: #181717; }
        .youtube { background-color: #FF0000; }
        .spotify { background-color: #1DB954; }
        .facebook { background-color: #1877F2; }

        /* محتوى الزر (النص + الأيقونة) */
        .btn-content {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            transition: opacity 0.3s ease;
        }

        /* الشاحنة المخفية داخل الزر */
        .truck-container {
            position: absolute;
            top: 0;
            left: -100%; /* تبدأ من خارج الزر يساراً */
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            opacity: 0;
        }

        /* ماذا يحدث عند إضافة كلاس 'animating' بواسطة الجافاسكريبت */
        .ship-btn.animating .btn-content {
            opacity: 0; /* إخفاء النص والأيقونة */
        }

        .ship-btn.animating .truck-container {
            opacity: 1; /* إظهار الشاحنة */
            animation: driveTruck 1.5s forwards ease-in-out; /* تشغيل الحركة */
        }

        /* مسار حركة الشاحنة */
        @keyframes driveTruck {
            0% { left: -50%; }
            40% { left: 0%; } /* تقف الشاحنة في المنتصف قليلاً */
            60% { left: 0%; }
            100% { left: 100%; } /* تخرج من اليمين */
        }
    </style>
</head>
<body>

    <div class="button-stack">
        <button class="ship-btn discord" data-url="https://discord.gg/Vk8WJhpQW4">
            <div class="btn-content"><i class="fa-brands fa-discord" style="margin-right: 10px; font-size: 1.3rem;"></i> Discord</div>
            <div class="truck-container"><span class="truck">🚚</span><span class="box">📦</span></div>
        </button>

        <button class="ship-btn instagram" data-url="https://www.instagram.com/skrt7_66">
            <div class="btn-content"><i class="fa-brands fa-instagram" style="margin-right: 10px; font-size: 1.3rem;"></i> Instagram</div>
            <div class="truck-container"><span class="truck">🚚</span><span class="box">📦</span></div>
        </button>

        <button class="ship-btn github" data-url="https://github.com/SKRT7-0day">
            <div class="btn-content"><i class="fa-brands fa-github" style="margin-right: 10px; font-size: 1.3rem;"></i> GitHub</div>
            <div class="truck-container"><span class="truck">🚚</span><span class="box">📦</span></div>
        </button>

        <button class="ship-btn youtube" data-url="https://www.youtube.com/@SKRT7-v5h">
            <div class="btn-content"><i class="fa-brands fa-youtube" style="margin-right: 10px; font-size: 1.3rem;"></i> YouTube</div>
            <div class="truck-container"><span class="truck">🚚</span><span class="box">📦</span></div>
        </button>
        
        <button class="ship-btn spotify" data-url="#">
            <div class="btn-content"><i class="fa-brands fa-spotify" style="margin-right: 10px; font-size: 1.3rem;"></i> Spotify</div>
            <div class="truck-container"><span class="truck">🚚</span><span class="box">📦</span></div>
        </button>

        <button class="ship-btn facebook" data-url="https://www.facebook.com/share/18giPaZseb/">
            <div class="btn-content"><i class="fa-brands fa-facebook" style="margin-right: 10px; font-size: 1.3rem;"></i> Facebook</div>
            <div class="truck-container"><span class="truck">🚚</span><span class="box">📦</span></div>
        </button>
    </div>

    <script>
        document.querySelectorAll('.ship-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                // منع المتصفح من الانتقال الفوري للرابط
                e.preventDefault(); 
                
                const targetUrl = this.getAttribute('data-url');
                
                // إضافة الكلاس لتشغيل حركة الشاحنة
                this.classList.add('animating');
                
                // تحديد وقت الانتظار (1.5 ثانية) لإنهاء الحركة ثم الانتقال
                setTimeout(() => {
                    if(targetUrl && targetUrl !== "#") {
                        window.location.href = targetUrl;
                    }
                    
                    // إعادة الزر لشكله الطبيعي في حال ضغط المستخدم على زر "الرجوع" بالمتصفح
                    setTimeout(() => {
                        this.classList.remove('animating');
                    }, 500);
                    
                }, 1500); 
            });
        });
    </script>
</body>
</html>
