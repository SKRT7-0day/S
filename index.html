  <style>
    :root {
      --bg-color: #07080B;
      --text-color: #E4E6EB;
      --card-bg: #1F222F;
      --sub-text: #94A3B8;
    }

    .light-theme {
      --bg-color: #F8FAFC;
      --text-color: #0F172A;
      --card-bg: #E2E8F0;
      --sub-text: #64748B;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.3s ease;
      font-family: sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      position: relative;
    }

    /* Dynamic background: softly tinted with the current Spotify album art's
       dominant color while playing, fades back to the normal background
       otherwise. Sits behind everything. */
    .dynamic-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: radial-gradient(circle at 50% 0%, var(--dynamic-tint, transparent) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 1.1s ease, background 1.1s ease;
    }
    .dynamic-bg.active {
      opacity: 1;
    }

    .container { margin-top: 10vh; position: relative; z-index: 1; }
    
    .avatar-wrapper {
      position: relative;
      width: 128px;
      height: 128px;
      margin: 0 auto 15px;
    }

    .avatar {
      border: 3px solid var(--card-bg);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      transition: transform 0.3s ease;
      width: 128px;
      height: 128px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 0;
      display: block;
    }
    .avatar:hover { transform: scale(1.05); }

    .avatar-decoration {
      position: absolute;
      top: -12%;
      left: -12%;
      width: 124%;
      height: 124%;
      pointer-events: none;
      display: none;
    }

    .status-dot {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 4px solid var(--bg-color);
      background-color: #80848e;
      transition: background-color 0.3s ease;
      overflow: hidden;
      z-index: 3;
    }

    .status-online { background-color: #23a55a; }

    .status-idle {
      background-color: #f0b232;
      position: absolute;
    }
    .status-idle::after {
      content: "";
      position: absolute;
      width: 70%;
      height: 70%;
      border-radius: 50%;
      background-color: var(--bg-color);
      top: -18%;
      left: -18%;
      transition: background-color 0.3s ease;
    }

    .status-dnd { background-color: #f23f43; }
    .status-dnd::after {
      content: "";
      position: absolute;
      width: 58%;
      height: 22%;
      background-color: #fff;
      border-radius: 2px;
      top: 39%;
      left: 21%;
    }

    .status-offline { background-color: #80848e; }
    .status-offline::after {
      content: "";
      position: absolute;
      width: 46%;
      height: 46%;
      border-radius: 50%;
      background-color: var(--bg-color);
      top: 27%;
      left: 27%;
      transition: background-color 0.3s ease;
    }

    .custom-status-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 8px 0 16px;
      flex-wrap: wrap;
      opacity: 1;
      visibility: visible;
      transition: opacity 0.3s ease, visibility 0.3s ease;
      animation: slideInCustomStatus 0.4s ease-out;
    }

    @keyframes slideInCustomStatus {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .discord-activity {
      color: var(--text-color);
      font-size: 0.85rem;
      margin: 0;
      min-height: 1.2em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-weight: 500;
      letter-spacing: 0.3px;
      transition: color 0.3s ease;
    }
    .discord-activity img {
      width: 16px;
      height: 16px;
      vertical-align: middle;
    }

    /* ==========================================
       LIVE ACTIVITY CARD (Spotify / Playing a game)
       ========================================== */
    .activity-card {
      display: none;
      width: 90%;
      max-width: 400px;
      margin: 0 auto 22px;
      background:
        linear-gradient(160deg, var(--card-tint, rgba(255,255,255,0.03)) 0%, rgba(31, 34, 47, 0.78) 55%);
      backdrop-filter: blur(14px);
      border: 1px solid var(--card-ring, rgba(255,255,255,0.08));
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 10px 34px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.02) inset;
      text-align: left;
      animation: slideInCustomStatus 0.4s ease-out;
      transition: background 0.7s ease, border-color 0.7s ease, box-shadow 0.7s ease;
    }

    .activity-card-header {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .activity-icon-wrap {
      position: relative;
      flex-shrink: 0;
      width: 108px;
      height: 108px;
    }

    .activity-icon {
      width: 108px;
      height: 108px;
      border-radius: 16px;
      object-fit: cover;
      display: block;
      background-color: rgba(255,255,255,0.06);
      box-shadow:
        0 12px 30px rgba(0,0,0,0.45),
        0 0 0 1px rgba(255,255,255,0.08),
        0 0 32px 2px var(--art-glow, transparent);
      transition: box-shadow 0.7s ease;
      position: relative;
      z-index: 1;
    }

    /* Soft blurred echo of the art behind it for a premium "glow" feel */
    .activity-icon-wrap::before {
      content: "";
      position: absolute;
      inset: 6px;
      border-radius: 16px;
      background-image: var(--art-bg-echo, none);
      background-size: cover;
      background-position: center;
      filter: blur(18px) saturate(1.4);
      opacity: 0.65;
      z-index: 0;
      transition: opacity 0.5s ease;
    }

    .activity-info {
      flex: 1;
      min-width: 0;
    }

    .activity-label {
      margin: 0 0 3px;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--sub-text);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .activity-title {
      margin: 0;
      font-size: 1.05rem;
      font-weight: bold;
      color: var(--text-color);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .activity-subtitle {
      margin: 3px 0 0;
      font-size: 0.82rem;
      color: var(--sub-text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .activity-progress {
      display: none;
      margin-top: 12px;
    }

    .activity-progress-bar {
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background-color: rgba(255,255,255,0.1);
      overflow: hidden;
    }

    .activity-progress-fill {
      height: 100%;
      width: 0%;
      background-color: #1DB954;
      border-radius: 2px;
      transition: width 0.9s linear;
    }

    .activity-progress-times {
      display: flex;
      justify-content: space-between;
      font-size: 0.68rem;
      color: var(--sub-text);
      margin-top: 4px;
    }

    .activity-elapsed-only {
      display: none;
      margin-top: 6px;
      font-size: 0.72rem;
      color: var(--sub-text);
    }

    .celebration-container { position: relative; display: inline-block; margin: 10px auto; padding: 10px 30px; cursor: crosshair; }
    .celebration-name {
      font-size: 3rem; font-weight: 900; letter-spacing: -0.03em;
      background: var(--gradient-color, linear-gradient(45deg, #ff007f, #a855f7, #3b82f6, #ffd700, #ff007f));
      background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      display: inline-block; animation: celebrateColors 3s linear infinite, partyPulse 1.2s ease-in-out infinite alternate;
      pointer-events: none; margin: 0;
    }
    @keyframes celebrateColors { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }
    @keyframes partyPulse { 0% { transform: scale(1); filter: drop-shadow(0 0 2px rgba(168, 85, 247, 0.3)); } 100% { transform: scale(1.06); filter: drop-shadow(0 0 12px #a855f7); } }
    p.bio { color: var(--sub-text); font-size: 0.95rem; margin-bottom: 20px; }

    .theme-switch-wrapper { margin: 25px auto 40px; display: flex; justify-content: center; }

    .theme-switch {
      --toggle-size: 20px;
      --container-width: 5.625em;
      --container-height: 2.5em;
      --container-radius: 0.38em;
      --container-light-bg: #5caad4;
      --container-night-bg: #1b1e36;
      --circle-container-diameter: 3.375em;
      --sun-moon-diameter: 2.125em;
      --sun-bg: #f5c518;
      --moon-bg: #d8d4c0;
      --spot-color: #9b9787;
      --circle-container-offset: calc((var(--circle-container-diameter) - var(--container-height)) / 2 * -1);
      --stars-color: #fff8e1;
      --clouds-color: #f4f4f4;
      --back-clouds-color: #bacfe0;
      --transition: 0.5s cubic-bezier(0, -0.02, 0.4, 1.25);
      --circle-transition: 0.3s cubic-bezier(0, -0.02, 0.35, 1.17);

    }

    .theme-switch, .theme-switch *, .theme-switch *::before, .theme-switch *::after { box-sizing: border-box; margin: 0; padding: 0; font-size: var(--toggle-size); }
    .theme-switch__container {

      border-radius: var(--container-radius); overflow: hidden; cursor: pointer; position: relative;

      border-radius: inherit; pointer-events: none;
    }
    .theme-switch__checkbox { display: none; }
    .theme-switch__circle-container {
      width: var(--circle-container-diameter); height: var(--circle-container-diameter); background-color: rgba(255, 255, 255, 0.1);
      position: absolute; left: var(--circle-container-offset); top: var(--circle-container-offset); border-radius: var(--container-radius);
      box-shadow: inset 0 0 0 3.375em rgba(255, 255, 255, 0.1), inset 0 0 0 3.375em rgba(255, 255, 255, 0.1), 0 0 0 0.625em rgba(255, 255, 255, 0.1), 0 0 0 1.25em rgba(255, 255, 255, 0.1);
      display: flex; transition: var(--circle-transition); pointer-events: none;
    }
    .theme-switch__circle-container::before {
      content: ""; position: absolute; width: calc(var(--circle-container-diameter) + 1.5em); height: calc(var(--circle-container-diameter) + 1.5em);
      left: -0.75em; top: -0.75em; border-radius: 50%;
      background: conic-gradient(transparent 0deg, transparent 8deg, rgba(245, 197, 24, 0.52) 8deg, rgba(245, 197, 24, 0.52) 22deg, transparent 22deg, transparent 53deg, rgba(245, 197, 24, 0.52) 53deg, rgba(245, 197, 24, 0.52) 67deg, transparent 67deg, transparent 98deg, rgba(245, 197, 24, 0.52) 98deg, rgba(245, 197, 24, 0.52) 112deg, transparent 112deg, transparent 143deg, rgba(245, 197, 24, 0.52) 143deg, rgba(245, 197, 24, 0.52) 157deg, transparent 157deg, transparent 188deg, rgba(245, 197, 24, 0.52) 188deg, rgba(245, 197, 24, 0.52) 202deg, transparent 202deg, transparent 233deg, rgba(245, 197, 24, 0.52) 233deg, rgba(245, 197, 24, 0.52) 247deg, transparent 247deg, transparent 278deg, rgba(245, 197, 24, 0.52) 278deg, rgba(245, 197, 24, 0.52) 292deg, transparent 292deg, transparent 323deg, rgba(245, 197, 24, 0.52) 323deg, rgba(245, 197, 24, 0.52) 337deg, transparent 337deg, transparent 360deg);
      animation: rotateSunRays 14s linear infinite; opacity: 1; transition: opacity var(--transition); pointer-events: none; filter: url(#sketchy-sm);
    }
    .theme-switch__checkbox:checked + .theme-switch__container .theme-switch__circle-container::before { opacity: 0; }
    @keyframes rotateSunRays { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .theme-switch__sun-moon-container {
      pointer-events: auto; position: relative; z-index: 2; width: var(--sun-moon-diameter); height: var(--sun-moon-diameter);
      margin: auto; border-radius: var(--container-radius); background-color: var(--sun-bg);
      box-shadow: 0.062em 0.062em 0.062em 0em rgba(254, 255, 239, 0.61) inset, 0em -0.062em 0.062em 0em #a1872a inset, 0.1em 0.13em 0 0.04em #1a1a1a;
      filter: url(#sketchy-sm) drop-shadow(0.062em 0.125em 0.125em rgba(0, 0, 0, 0.25)) drop-shadow(0em 0.062em 0.125em rgba(0, 0, 0, 0.25));
      overflow: hidden; transition: var(--transition); transform: scale(1);
    }
    .theme-switch__sun-moon-container:hover { transform: scale(1.1) rotate(5deg); }
    .theme-switch__moon {
      transform: translateX(100%); width: 100%; height: 100%; background-color: var(--moon-bg); border-radius: inherit;
      box-shadow: 0.062em 0.062em 0.062em 0em rgba(254, 255, 239, 0.61) inset, 0em -0.062em 0.062em 0em #969696 inset;
      transition: all var(--transition), transform 0.3s ease; position: relative;
    }
    .theme-switch__moon:hover { transform: rotate(15deg); }
    .theme-switch__spot { position: absolute; top: 0.75em; left: 0.312em; width: 0.75em; height: 0.75em; border-radius: var(--container-radius); background-color: var(--spot-color); box-shadow: 0em 0.0312em 0.062em rgba(0, 0, 0, 0.25) inset; transition: background-color 0.3s ease; filter: url(#sketchy-sm); }

    .theme-switch__moon:hover .theme-switch__spot { background-color: #7a7f8c; }
    .theme-switch__clouds {
      width: 1.25em; height: 1.25em; background-color: var(--clouds-color); border-radius: var(--container-radius);
      position: absolute; bottom: -0.625em; left: 0.312em;
      box-shadow: 0.937em 0.312em var(--clouds-color), -0.312em -0.312em var(--back-clouds-color), 1.437em 0.375em var(--clouds-color), 0.5em -0.125em var(--back-clouds-color), 2.187em 0 var(--clouds-color), 1.25em -0.062em var(--back-clouds-color), 2.937em 0.312em var(--clouds-color), 2em -0.312em var(--back-clouds-color), 3.625em -0.062em var(--clouds-color), 2.625em 0em var(--back-clouds-color), 4.5em -0.312em var(--clouds-color), 3.375em -0.437em var(--back-clouds-color), 4.625em -1.75em 0 0.437em var(--clouds-color), 4em -0.625em var(--back-clouds-color), 4.125em -2.125em 0 0.437em var(--clouds-color);
      transition: 0.5s cubic-bezier(0, -0.02, 0.4, 1.25); filter: url(#sketchy-sm);
    }
    .theme-switch__stars-container { position: absolute; color: var(--stars-color); top: -100%; left: 0.312em; width: 2.75em; height: auto; transition: var(--transition); }
    .theme-switch__checkbox:checked + .theme-switch__container { background-color: var(--container-night-bg); background-image: linear-gradient(to bottom, var(--container-night-bg) 0%, #252a4a 100%); }
    .theme-switch__checkbox:checked + .theme-switch__container .theme-switch__circle-container { left: calc(100% - var(--circle-container-offset) - var(--circle-container-diameter)); }
    .theme-switch__checkbox:checked + .theme-switch__container .theme-switch__circle-container:hover { left: calc(100% - var(--circle-container-offset) - var(--circle-container-diameter) - 0.187em); }
    .theme-switch__circle-container:hover { left: calc(var(--circle-container-offset) + 0.187em); }
    .theme-switch__checkbox:checked + .theme-switch__container .theme-switch__moon { transform: translate(0); }
    .theme-switch__checkbox:checked + .theme-switch__container .theme-switch__clouds { bottom: -4.062em; }
    .theme-switch__checkbox:checked + .theme-switch__container .theme-switch__stars-container { top: 50%; transform: translateY(-50%); }
    .theme-switch__container:hover .theme-switch__clouds { transform: translateX(15px) scale(1.02); }

    .theme-switch__sun-moon-container:hover::after { opacity: 1; }
    .theme-switch__shooting-star { position: absolute; width: 2px; height: 2px; background: white; top: 20%; left: -10%; opacity: 0; transition: opacity 0.3s ease; }
    .theme-switch__shooting-star-2 { position: absolute; width: 1px; height: 1px; background: white; top: 35%; left: -10%; opacity: 0; transition: opacity 0.3s ease; }

    .button-stack { width: 90%; max-width: 400px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }

  </div>
  <script>
    const nameContainer = document.getElementById('interactiveName');
    const colors = ['#ff007f', '#a855f7', '#3b82f6', '#ffd700', '#00ffcc'];

    function spawnConfetti(e) {
      if(Math.random() > 0.6) return; 
      const rect = nameContainer.getBoundingClientRect();
      const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
      const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;

      const confetti = document.createElement('span');
      confetti.style.position = 'absolute'; confetti.style.width = '7px'; confetti.style.height = '7px';
      confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
      confetti.style.borderRadius = (Math.random() > 0.5) ? '50%' : '2px';
      confetti.style.pointerEvents = 'none'; confetti.style.left = x + 'px'; confetti.style.top = y + 'px';
      
      const moveX = (Math.random() - 0.5) * 120; const moveY = (Math.random() - 1) * 100; 

      confetti.animate([
        { transform: 'translate(0, 0) scale(1) rotate(0deg)', opacity: 1 },
        { transform: `translate(${moveX}px, ${moveY}px) scale(0) rotate(${Math.random() * 360}deg)`, opacity: 0 }
      ], { duration: 800 + Math.random() * 500, easing: 'ease-out' });

      nameContainer.appendChild(confetti);
      setTimeout(() => confetti.remove(), 1300);
    }
    nameContainer.addEventListener('mousemove', spawnConfetti);
    nameContainer.addEventListener('touchmove', spawnConfetti);

    const themeCheckbox = document.getElementById('themeCheckbox');
    
    if (localStorage.getItem('theme') === 'light') {
      document.body.classList.add('light-theme');
      themeCheckbox.checked = false; 
    } else {
      themeCheckbox.checked = true; 
    }

    themeCheckbox.addEventListener('change', () => {
      document.body.classList.toggle('light-theme');
      localStorage.setItem('theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
      
      const statusDot = document.getElementById('statusDot');
      if (statusDot) {
        void statusDot.offsetHeight; 
        statusDot.style.filter = 'brightness(1.01)';
        setTimeout(() => statusDot.style.filter = '', 10);
      }
    });

    window.addEventListener('load', () => {
      setTimeout(() => {
        const loader = document.getElementById('loadingScreen');
        if (loader) {
          loader.classList.add('fade-out');
        }
      }, 2500);
    });

    const DISCORD_ID = "1217944125555474565";

    // ==========================================
    // LIVE ACTIVITY CARD (Spotify / Playing a game)
    // ==========================================
    let activityTicker = null;
    let activityTickerMode = null; // 'spotify' | 'game' | null
    let activityTickerData = null;

    function formatClock(ms) {
      if (!isFinite(ms) || ms < 0) ms = 0;
      const totalSec = Math.floor(ms / 1000);
      const h = Math.floor(totalSec / 3600);
      const m = Math.floor((totalSec % 3600) / 60);
      const s = totalSec % 60;
      if (h > 0) {
        return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
      }
      return `${m}:${s.toString().padStart(2, '0')}`;
    }

    function stopActivityTicker() {
      if (activityTicker) {
        clearInterval(activityTicker);
        activityTicker = null;
      }
      activityTickerMode = null;
      activityTickerData = null;
    }

    function tickSpotifyProgress() {
      if (!activityTickerData) return;
      const { start, end } = activityTickerData;
      const now = Date.now();
      const elapsed = Math.min(Math.max(now - start, 0), end - start);
      const total = end - start;
      const pct = total > 0 ? (elapsed / total) * 100 : 0;

      document.getElementById('activityProgressFill').style.width = pct + '%';
      document.getElementById('activityElapsed').textContent = formatClock(elapsed);
      document.getElementById('activityDuration').textContent = formatClock(total);
    }

    function tickGameElapsed() {
      if (!activityTickerData) return;
      const elapsed = Date.now() - activityTickerData.start;
      document.getElementById('activityElapsedOnly').textContent = formatClock(elapsed) + ' elapsed';
    }

    function getGameImageUrl(activity) {
      const large = activity.assets && activity.assets.large_image;
      if (!large) return null;
      if (large.startsWith('mp:')) {
        return `https://media.discordapp.net/${large.slice(3)}`;
      }
      if (activity.application_id) {
        return `https://cdn.discordapp.com/app-assets/${activity.application_id}/${large}.png`;
      }
      return null;
    }

    // ==========================================
    // DYNAMIC BACKGROUND — tints the page with the
    // dominant color of the current album/game art
    // ==========================================
    let lastDynamicBgUrl = null;
    const dynamicColorCache = new Map();

    function extractDominantColor(imgUrl) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => {
          try {
            const canvas = document.createElement('canvas');
            const size = 32;
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, size, size);
            const { data } = ctx.getImageData(0, 0, size, size);

            let r = 0, g = 0, b = 0, count = 0;
            for (let i = 0; i < data.length; i += 4) {
              const alpha = data[i + 3];
              if (alpha < 128) continue;
              r += data[i];
              g += data[i + 1];
              b += data[i + 2];
              count++;
            }
            if (count === 0) return reject(new Error('No opaque pixels'));
            resolve([Math.round(r / count), Math.round(g / count), Math.round(b / count)]);
          } catch (err) {
            reject(err);
          }
        };
        img.onerror = reject;
        img.src = imgUrl;
      });
    }

    async function applyDynamicBackground(imgUrl) {
      if (!imgUrl || imgUrl === lastDynamicBgUrl) return;
      lastDynamicBgUrl = imgUrl;

      const card = document.getElementById('activityCard');
      card.style.setProperty('--art-bg-echo', `url("${imgUrl}")`);

      try {
        let rgb = dynamicColorCache.get(imgUrl);
        if (!rgb) {
          rgb = await extractDominantColor(imgUrl);
          dynamicColorCache.set(imgUrl, rgb);
        }
        if (lastDynamicBgUrl !== imgUrl) return; // a newer track/game took over meanwhile

        const [r, g, b] = rgb;
        const bg = document.getElementById('dynamicBg');
        bg.style.setProperty('--dynamic-tint', `rgba(${r}, ${g}, ${b}, 0.32)`);
        bg.classList.add('active');

        card.style.setProperty('--art-glow', `rgba(${r}, ${g}, ${b}, 0.55)`);
        card.style.setProperty('--card-tint', `rgba(${r}, ${g}, ${b}, 0.22)`);
        card.style.setProperty('--card-ring', `rgba(${r}, ${g}, ${b}, 0.35)`);
      } catch (err) {
        // CORS-blocked or failed to load — keep the art echo but skip the color tint.
        console.warn('Dynamic background color extraction failed:', err);
      }
    }

    function clearDynamicBackground() {
      lastDynamicBgUrl = null;
      document.getElementById('dynamicBg').classList.remove('active');
      const card = document.getElementById('activityCard');
      card.style.removeProperty('--art-glow');
      card.style.removeProperty('--art-bg-echo');
      card.style.removeProperty('--card-tint');
      card.style.removeProperty('--card-ring');
    }

    function showSpotifyCard(spotify) {
      const card = document.getElementById('activityCard');
      const icon = document.getElementById('activityIcon');
      const label = document.getElementById('activityLabel');
      const title = document.getElementById('activityTitle');
      const subtitle = document.getElementById('activitySubtitle');
      const progressWrap = document.getElementById('activityProgressWrap');
      const elapsedOnly = document.getElementById('activityElapsedOnly');

      const artUrl = spotify.album_art_url || '';
      icon.src = artUrl;
      label.innerHTML = '<i class="fa-brands fa-spotify" style="color:#1DB954;"></i> Listening to Spotify';
      title.textContent = spotify.song || '';
      subtitle.textContent = spotify.artist ? `by ${spotify.artist}${spotify.album ? ' • ' + spotify.album : ''}` : '';

      progressWrap.style.display = 'block';
      elapsedOnly.style.display = 'none';
      card.style.display = 'block';

      if (artUrl) applyDynamicBackground(artUrl);

      const start = spotify.timestamps?.start;
      const end = spotify.timestamps?.end;
      if (start && end) {
        activityTickerData = { start, end };
        tickSpotifyProgress();
        if (activityTickerMode !== 'spotify') {
          stopActivityTicker();
          activityTickerMode = 'spotify';
          activityTicker = setInterval(tickSpotifyProgress, 1000);
        }
      }
    }

    function showGameCard(activity) {
      const card = document.getElementById('activityCard');
      const icon = document.getElementById('activityIcon');
      const label = document.getElementById('activityLabel');
      const title = document.getElementById('activityTitle');
      const subtitle = document.getElementById('activitySubtitle');
      const progressWrap = document.getElementById('activityProgressWrap');
      const elapsedOnly = document.getElementById('activityElapsedOnly');

      const imgUrl = getGameImageUrl(activity);
      icon.src = imgUrl || '';
      icon.style.visibility = imgUrl ? 'visible' : 'hidden';
      label.innerHTML = '<i class="fa-solid fa-gamepad" style="color:#a855f7;"></i> Playing';
      title.textContent = activity.name || '';
      subtitle.textContent = activity.details || activity.state || '';

      progressWrap.style.display = 'none';
      card.style.display = 'block';

      if (imgUrl) {
        applyDynamicBackground(imgUrl);
      } else {
        clearDynamicBackground();
      }

      if (activity.timestamps && activity.timestamps.start) {
        elapsedOnly.style.display = 'block';
        activityTickerData = { start: activity.timestamps.start };
        tickGameElapsed();
        if (activityTickerMode !== 'game') {
          stopActivityTicker();
          activityTickerMode = 'game';
          activityTicker = setInterval(tickGameElapsed, 1000);
        }
      } else {
        elapsedOnly.style.display = 'none';
        stopActivityTicker();
      }
    }

    function hideActivityCard() {
      document.getElementById('activityCard').style.display = 'none';
      stopActivityTicker();
      clearDynamicBackground();
    }

    function updateActivityCard(data) {
      if (data.listening_to_spotify && data.spotify) {
        showSpotifyCard(data.spotify);
        return;
      }
      const gameActivity = (data.activities || []).find(a => a.type === 0);
      if (gameActivity) {
        showGameCard(gameActivity);
        return;
      }
      hideActivityCard();
    }

    async function updateDiscordPresence() {
      try {
        const res = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
        
        if (!res.ok) return;
        
        const json = await res.json();
        
        if (!json.success) return;

        const data = json.data;
        const user = data.discord_user;

        const avatarImg = document.getElementById('discordAvatar');
        if (user && user.avatar) {
          avatarImg.src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=256`;
          avatarImg.style.display = 'block';
        } else {
          avatarImg.style.display = 'block'; 
        }

        if (user && user.accent_color) {
          const accentColor = '#' + user.accent_color.toString(16).padStart(6, '0').toUpperCase();
          
          const r = parseInt(accentColor.slice(1, 3), 16);
          const g = parseInt(accentColor.slice(3, 5), 16);
          const b = parseInt(accentColor.slice(5, 7), 16);
          
          const lighterColor = `rgb(${Math.min(r + 50, 255)}, ${Math.min(g + 50, 255)}, ${Math.min(b + 50, 255)})`;
          const darkerColor = `rgb(${Math.max(r - 50, 0)}, ${Math.max(g - 50, 0)}, ${Math.max(b - 50, 0)})`;
          
          const gradient = `linear-gradient(45deg, ${accentColor}, ${lighterColor}, ${accentColor}, ${darkerColor}, ${accentColor})`;
          
          document.documentElement.style.setProperty('--gradient-color', gradient);
        }

        const decoEl = document.getElementById('avatarDecoration');
        if (user && user.avatar_decoration_data && user.avatar_decoration_data.asset) {
          const decoUrl = `https://cdn.discordapp.com/avatar-decoration-presets/${user.avatar_decoration_data.asset}.png?size=256`;
          decoEl.src = decoUrl;
          decoEl.style.display = 'block';
          decoEl.style.visibility = 'visible';
        } else {
          decoEl.style.display = 'none';
          decoEl.style.visibility = 'hidden';
        }

        const statusDot = document.getElementById('statusDot');
        const status = data.discord_status || 'offline';
        
        statusDot.classList.remove('status-online', 'status-idle', 'status-dnd', 'status-offline');
        
        statusDot.classList.add('status-' + status);
        
        const statusLabels = {
          'online': '🟢 Online',
          'idle': '🌙 Idle (Away)',
          'dnd': '🔴 Do Not Disturb',
          'offline': '⚫ Offline'
        };
        statusDot.title = statusLabels[status] || 'Unknown';

        const customStatusEl = document.getElementById('discordCustomStatus');
        let customStatusText = '';
        
        if (data.activities && data.activities.length > 0) {
          const customStatus = data.activities.find(a => a.type === 4); 
          if (customStatus && customStatus.state) {
            customStatusText = customStatus.state;
            if (customStatus.emoji) {
              if (customStatus.emoji.id) {
                const ext = customStatus.emoji.animated ? 'gif' : 'png';
                const altExt = customStatus.emoji.animated ? 'png' : 'gif';
                const emojiId = customStatus.emoji.id;
                const emojiStr = `<img src="https://cdn.discordapp.com/emojis/${emojiId}.${ext}" data-alt="https://cdn.discordapp.com/emojis/${emojiId}.${altExt}" data-tried="0" style="width:18px;height:18px;margin-right:4px;vertical-align:middle;" alt="" onerror="if(this.dataset.tried==='0'){this.dataset.tried='1';this.src=this.dataset.alt;}else{this.style.display='none';}">`;
                customStatusText = emojiStr + customStatusText;
              } else if (customStatus.emoji.name) {
                customStatusText = customStatus.emoji.name + ' ' + customStatusText;
              }
            }
          }
        }
        
        customStatusEl.innerHTML = customStatusText ? customStatusText : '';

        const container = document.getElementById('customStatusContainer');
        if (customStatusText) {
          container.style.opacity = '1';
          container.style.visibility = 'visible';
        } else {
          container.style.opacity = '0.6';
          container.style.visibility = 'visible';
        }

        updateActivityCard(data);

      } catch (err) {
        console.error('Lanyard fetch failed:', err);
      }
    }

    updateDiscordPresence();
    setInterval(updateDiscordPresence, 5000);
  </script>
