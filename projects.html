<!DOCTYPE html>
<html class="theme-dark" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SKRT7 | Projects</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* (نفس تنسيقات CSS السابقة، أضف هذا الجزء الخاص ببطاقات GitHub) */
    :root { --bg-color: #07080B; --text-color: #E4E6EB; --card-bg: #1F222F; --accent-color: #a855f7; }
    body { background-color: var(--bg-color); color: var(--text-color); font-family: sans-serif; margin: 0; padding: 40px 20px; }
    .projects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
    .project-card { background-color: var(--card-bg); border-radius: 15px; padding: 25px; transition: transform 0.3s; }
    .star-btn { display: inline-block; background: #333; color: #fff; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; }
    .star-count { margin-left: 10px; color: #fde047; }
  </style>
</head>
<body>

  <div class="container">
    <div class="header" style="text-align: center; margin-bottom: 40px;">
      <h1>My GitHub Projects</h1>
    </div>
    <div class="projects-grid" id="projectsContainer">
      <!-- البطاقات ستظهر هنا تلقائياً عن طريق الجافا سكريبت -->
    </div>
  </div>

  <script>
    // 1. ضع قائمة بأسماء مشاريعك في GitHub هنا
    const repoNames = [
      "SKRT7-0day/repo-name-1", 
      "SKRT7-0day/repo-name-2"
    ];

    async function fetchProjects() {
      const container = document.getElementById('projectsContainer');
      let projects = [];

      for (const repo of repoNames) {
        const res = await fetch(`https://api.github.com/repos/${repo}`);
        const data = await res.json();
        projects.push(data);
      }

      // 2. ترتيب المشاريع (الأكثر نجومية أولاً)
      projects.sort((a, b) => b.stargazers_count - a.stargazers_count);

      // 3. عرض المشاريع
      container.innerHTML = projects.map(p => `
        <div class="project-card">
          <h2>${p.name}</h2>
          <p>${p.description || 'No description'}</p>
          <a href="${p.html_url}" target="_blank" class="star-btn">
            <i class="fa-solid fa-star"></i> Star <span class="star-count">${p.stargazers_count}</span>
          </a>
        </div>
      `).join('');
    }

    fetchProjects();
  </script>
</body>
</html>
